name: Nightly integration (live HL)

# Catches Hyperliquid API drift that the per-PR gate cannot see: if HL changes a
# response shape, the HL* Pydantic models stop parsing and these live tests fail.
# Runs on a schedule (not per-PR) because it makes real calls to the public HL API.
#
# HL_SAMPLE_WALLETS is optional: wallet-dependent tests skip gracefully when it is
# unset (see tests/integration/test_live_hl.py). Set it as a repo *variable*
# (Settings -> Secrets and variables -> Actions -> Variables) for full coverage —
# these are public leaderboard addresses, not secrets.
#
# Note: GitHub auto-disables scheduled workflows after 60 days with no repo
# activity; a push or a manual run re-enables it.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily (off-peak)
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  live:
    name: live integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HL_SAMPLE_WALLETS: ${{ vars.HL_SAMPLE_WALLETS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync (project + dev deps, from uv.lock)
        run: uv sync --frozen

      - name: Import sanity
        run: uv run python -c "import hlmcp"

      # Live calls are inherently flakier than unit tests; retry a failing test a
      # couple of times before declaring drift, so transient network/API blips
      # don't raise false alarms. A genuine schema change fails all retries.
      - name: Live integration tests
        run: uv run pytest -m integration --reruns 2 --reruns-delay 5
